<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Servicios | Mapard Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. HEADER GENÉRICO (Con enlaces actualizados) -->
    <header>
        <nav>
            <a href="index.html" class="logo-header">
                <img src="img/logo-mapache.JPEG" alt="Logo Mapache Studio">
            </a>
            <ul>
                <!-- Nota cómo ahora apuntan a index.html para poder regresar -->
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="index.html#galeria">Colecciones</a></li>
                <li><a href="servicios.html">Mapache Packs</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- 2. CONTENIDO PRINCIPAL DE ESTA VISTA -->
    <main>
        <!-- Encabezado exclusivo de esta página -->
        <section id="encabezado-servicios" style="text-align: center; padding-bottom: 0;">
            <h1>Catálogo de Servicios</h1>
            <p style="font-family: var(--fuente-acento); font-size: 1.5rem; color: var(--color-mapache-marron);">Selecciona una categoría para descubrir nuestros paquetes</p>
        </section>

        <!-- El contenedor donde nuestro JavaScript inyectará las 11 tarjetas -->
        <section id="categorias">
            <div id="grid-categorias" class="grid-galeria">
                <!-- JS hace la magia aquí -->
            </div>
        </section>
    </main>

    <!-- 3. MODALES GENÉRICOS (Limpios y sin estilos en línea) -->
    <div id="modal-imagen" class="modal">
        <span class="cerrar-modal">&times;</span> 
        <img class="modal-contenido" id="img-ampliada" alt="Imagen ampliada">
    </div>

    <div id="modal-precios" class="modal">
        <div class="modal-caja-blanca">
            <span class="cerrar-precios">&times;</span>
            <h2 id="titulo-modal-precios">Paquetes</h2>
            <div id="contenedor-dinamico-precios" class="contenedor-paquetes">
                <!-- JS inyecta los precios aquí -->
            </div>
        </div>
    </div>

    <!-- 4. BOTÓN DE WHATSAPP GENÉRICO -->
    <a href="https://wa.me/5216141395367?text=Hola,%20me%20gustaría%20cotizar%20una%20sesión." class="btn-whatsapp" target="_blank" rel="noopener noreferrer">
        Agendar Sesión por WhatsApp
    </a>

    <!-- 5. FOOTER GENÉRICO -->
    <footer id="contacto">
        <div class="footer-contenido">
            <div class="copyright">
                <p>&copy; 2026 Mapard Studio. Todos los derechos reservados.</p>
            </div>
            
            <div class="redes-sociales">
                <a href="https://www.instagram.com/mapard_studio/?hl=en" target="_blank" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                
                <a href="https://www.facebook.com/profile.php?id=61565506976331&locale=es_LA" target="_blank" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </a>
                
                <a href="https://www.tiktok.com/@mapard.studio?lang=en" target="_blank" aria-label="TikTok">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <!-- 6. SCRIPT PRINCIPAL -->
    <script src="script.js"></script> 
</body>
</html>
